apiVersion: v1
kind: Namespace
metadata:
  name: telehealx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telehealx-config
  namespace: telehealx
data:
  AUTH_SERVICE_URL: http://auth-service:5001
  USER_SERVICE_URL: http://auth-service:5001
  PATIENT_SERVICE_URL: http://patient-service:5015
  DOCTOR_SERVICE_URL: http://doctor-service:5010
  AI_SERVICE_URL: http://ai-service:5004
  APPOINTMENT_SERVICE_URL: http://appointment-service:5007
  PAYMENT_SERVICE_URL: http://payment-service:5006
  TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5005
  NOTIFICATION_SERVICE_URL: http://notification-service:5008
  CLIENT_URL: http://localhost:5173
  DEFAULT_TIMEZONE: Asia/Colombo
  NODE_ENV: development
  CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
  USE_MOCK_DOCTOR_SERVICE: "false"
  USE_MOCK_PATIENT_SERVICE: "false"
  MAX_RESCHEDULE_COUNT: "2"
  STRIPE_CURRENCY: usd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: telehealx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: telehealx-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: telehealx-config
            - secretRef:
                name: telehealx-secrets
          env:
            - name: PORT
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: telehealx
spec:
  selector:
    app: api-gateway
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
